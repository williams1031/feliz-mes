<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Feliz Mes &#10084;&#65039;</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --pink: #ff8fb1;
      --rose: #ff4f87;
      --purple: #a86ee6;
      --soft-red: #ff6b7d;
      --card-bg: rgba(255, 255, 255, 0.16);
      --text: #fff9fc;
      --text-strong: #4a1232;
      --shadow: 0 16px 45px rgba(80, 14, 55, 0.28);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      overflow-x: hidden;
      overflow-y: auto;
      display: grid;
      place-items: center;
      font-family: "Playfair Display", serif;
      color: var(--text);
      position: relative;
      background: linear-gradient(135deg, #ff9ab6 0%, #d08bff 48%, #ff7d8f 100%);
      background-size: 220% 220%;
      animation: romanticGradient 14s ease-in-out infinite;
      padding:
        max(12px, env(safe-area-inset-top))
        max(12px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(12px, env(safe-area-inset-left));
      -webkit-tap-highlight-color: transparent;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(2px);
    }

    body::before {
      width: 44vmax;
      height: 44vmax;
      top: -14vmax;
      right: -8vmax;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.22) 0%, rgba(255, 255, 255, 0) 68%);
      animation: blobMoveA 16s ease-in-out infinite alternate;
    }

    body::after {
      width: 40vmax;
      height: 40vmax;
      bottom: -15vmax;
      left: -10vmax;
      background: radial-gradient(circle, rgba(255, 245, 251, 0.24) 0%, rgba(255, 255, 255, 0) 70%);
      animation: blobMoveB 18s ease-in-out infinite alternate;
    }

    @keyframes blobMoveA {
      from { transform: translate(0, 0); }
      to { transform: translate(-3vmax, 2vmax); }
    }

    @keyframes blobMoveB {
      from { transform: translate(0, 0); }
      to { transform: translate(4vmax, -2vmax); }
    }

    @keyframes romanticGradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.28) 0 3px, transparent 4px),
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.25) 0 2px, transparent 3px),
        radial-gradient(circle at 60% 75%, rgba(255, 255, 255, 0.23) 0 2px, transparent 3px),
        radial-gradient(circle at 35% 65%, rgba(255, 255, 255, 0.22) 0 2px, transparent 3px);
      opacity: 0.48;
      animation: twinkle 7s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes twinkle {
      from { opacity: 0.26; transform: translateY(0); }
      to { opacity: 0.58; transform: translateY(-6px); }
    }

    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .heart {
      --size: 18px;
      position: absolute;
      width: var(--size);
      height: var(--size);
      background: rgba(255, 255, 255, 0.56);
      transform: rotate(45deg);
      border-radius: 3px;
      animation: floatUp linear infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.22));
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: var(--size);
      height: var(--size);
      border-radius: 50%;
      background: inherit;
    }

    .heart::before { left: calc(var(--size) * -0.5); }
    .heart::after { top: calc(var(--size) * -0.5); }

    @keyframes floatUp {
      from {
        transform: translateY(100vh) rotate(45deg) scale(0.8);
        opacity: 0;
      }
      15% {
        opacity: 0.9;
      }
      to {
        transform: translateY(-22vh) rotate(45deg) scale(1.2);
        opacity: 0;
      }
    }

    .container {
      width: min(880px, 96vw);
      z-index: 2;
      text-align: center;
      display: grid;
      gap: 18px;
      padding: 24px 18px;
      border-radius: 26px;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.25), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.34);
      box-shadow:
        0 18px 42px rgba(80, 14, 55, 0.26),
        inset 0 1px 1px rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(12px);
      animation: fadeUp 1.2s ease both;
    }

    @keyframes fadeUp {
      from {
        transform: translateY(16px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    h1 {
      font-family: "Great Vibes", cursive;
      font-size: clamp(3rem, 8vw, 5.2rem);
      line-height: 1;
      color: #fff6fb;
      text-shadow: 0 6px 18px rgba(63, 7, 39, 0.42);
      animation: fadeUp 1.3s ease both;
      letter-spacing: 0.4px;
    }

    .slideshow {
      width: min(640px, 100%);
      aspect-ratio: 4 / 3;
      max-height: 56svh;
      margin: 0 auto;
      position: relative;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 16px 40px rgba(75, 8, 44, 0.35);
      border: 3px solid rgba(255, 255, 255, 0.36);
      animation: fadeUp 1.5s ease both;
      background: rgba(255, 255, 255, 0.08);
      --active-image: none;
      display: grid;
      place-items: center;
    }

    .slideshow::before {
      content: "";
      position: absolute;
      inset: -18%;
      background-image: var(--active-image);
      background-size: cover;
      background-position: center;
      filter: blur(26px) saturate(1.05);
      transform: scale(1.1);
      opacity: 0.65;
      z-index: 0;
      transition: background-image 0.7s ease;
    }

    .slideshow::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.06), rgba(20, 7, 18, 0.33));
      z-index: 1;
      pointer-events: none;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
      transition: opacity 1.1s ease;
      transform: scale(1);
      will-change: opacity;
      z-index: 2;
      padding: 10px;
    }

    .slide.active {
      opacity: 1;
    }

    .message {
      margin: 4px auto 0;
      width: min(740px, 95%);
      white-space: pre-line;
      font-size: clamp(1rem, 2.9vw, 1.23rem);
      font-weight: 600;
      color: var(--text-strong);
      line-height: 1.72;
      letter-spacing: 0.2px;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.25);
      animation: fadeUp 1.7s ease both;
      background: linear-gradient(
        160deg,
        rgba(255, 238, 247, 0.34),
        rgba(255, 225, 241, 0.2)
      );
      border: 1px solid rgba(255, 255, 255, 0.28);
      box-shadow:
        0 10px 24px rgba(95, 19, 59, 0.13),
        inset 0 1px 0 rgba(255, 255, 255, 0.26);
      backdrop-filter: blur(8px) saturate(1.05);
      -webkit-backdrop-filter: blur(8px) saturate(1.05);
      border-radius: 16px;
      padding: 14px 12px;
    }

    @media (max-width: 640px) {
      body {
        place-items: start center;
      }

      .container {
        margin: 8px 0 10px;
        width: min(680px, 100%);
        padding: 14px 10px 16px;
        gap: 12px;
        border-radius: 20px;
      }

      .slideshow {
        aspect-ratio: 4 / 5;
        max-height: 46svh;
        border-radius: 18px;
      }

      .slide {
        padding: 8px;
      }

      h1 {
        font-size: clamp(2.4rem, 12vw, 3.7rem);
      }

      .message {
        width: 97%;
        font-size: clamp(0.96rem, 4vw, 1.08rem);
        line-height: 1.58;
        padding: 12px 10px;
      }
    }

    @media (max-width: 390px) {
      .slideshow {
        max-height: 42svh;
      }

      .message {
        font-size: 0.94rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="sparkles" aria-hidden="true"></div>
  <div class="hearts" id="hearts" aria-hidden="true"></div>

  <main class="container">
    <h1>Feliz Mes &#10084;&#65039;</h1>

    <section class="slideshow" aria-label="Galeria de recuerdos">
      <img class="slide active" src="./WhatsApp Image 2026-03-04 at 17.17.30.jpeg" alt="Recuerdo romantico 1" loading="eager" decoding="async" />
      <img class="slide" src="./WhatsApp Image 2026-03-04 at 17.17.30 (1).jpeg" alt="Recuerdo romantico 2" loading="lazy" decoding="async" />
      <img class="slide" src="./WhatsApp Image 2026-03-04 at 17.17.30 (2).jpeg" alt="Recuerdo romantico 3" loading="lazy" decoding="async" />
      <img class="slide" src="./WhatsApp Image 2026-03-04 at 17.17.30 (3).jpeg" alt="Recuerdo romantico 4" loading="lazy" decoding="async" />
      <img class="slide" src="./WhatsApp Image 2026-03-04 at 17.17.30 (4).jpeg" alt="Recuerdo romantico 5" loading="lazy" decoding="async" />
      <img class="slide" src="./WhatsApp Image 2026-03-04 at 17.18.12.jpeg" alt="Recuerdo romantico 6" loading="lazy" decoding="async" />
    </section>

    <p class="message">
Feliz mes, mi amor &#10084;&#65039;
Cada d&iacute;a a tu lado es un regalo que la vida me dio.
Gracias por cada risa, cada abrazo y cada momento que compartimos.
A tu lado todo es m&aacute;s bonito, m&aacute;s ligero y m&aacute;s feliz.
Que este sea solo uno de muchos meses m&aacute;s construyendo recuerdos juntos.
Te amo much&iacute;simo.
    </p>
  </main>

  <script>
    // Slideshow con transicion fade cada 3 segundos
    const slideshow = document.querySelector(".slideshow");
    const slides = document.querySelectorAll(".slide");
    let current = 0;

    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const slideIntervalMs = reducedMotion ? 5000 : 3000;

    function syncBackdropWithActiveSlide() {
      const activeSrc = slides[current].getAttribute("src");
      const safeSrc = activeSrc.replace(/"/g, '\\"');
      slideshow.style.setProperty("--active-image", `url("${safeSrc}")`);
    }

    syncBackdropWithActiveSlide();

    setInterval(() => {
      slides[current].classList.remove("active");
      current = (current + 1) % slides.length;
      slides[current].classList.add("active");
      syncBackdropWithActiveSlide();
    }, slideIntervalMs);

    // Corazones flotantes suaves en segundo plano
    const heartsContainer = document.getElementById("hearts");
    const HEART_COUNT = reducedMotion ? 0 : (window.innerWidth <= 640 ? 10 : 18);

    for (let i = 0; i < HEART_COUNT; i += 1) {
      const heart = document.createElement("span");
      heart.className = "heart";

      const size = 10 + Math.random() * 18;
      const left = Math.random() * 100;
      const duration = 8 + Math.random() * 12;
      const delay = Math.random() * -20;
      const opacity = 0.28 + Math.random() * 0.55;

      heart.style.setProperty("--size", `${size}px`);
      heart.style.left = `${left}vw`;
      heart.style.animationDuration = `${duration}s`;
      heart.style.animationDelay = `${delay}s`;
      heart.style.opacity = opacity.toFixed(2);

      heartsContainer.appendChild(heart);
    }
  </script>
</body>
</html>
